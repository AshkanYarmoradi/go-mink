name: Enforce PR Source Branch

on:
  pull_request:
    branches:
      - main

# This workflow only inspects github.head_ref and echoes a message; it never uses the
# GITHUB_TOKEN. Drop all token permissions (principle of least privilege).
permissions: {}

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR comes from develop
        if: github.head_ref != 'develop'
        # Bind the expression to an environment variable to prevent script injection
        env:
          SOURCE_BRANCH: ${{ github.head_ref }}
        run: |
          echo "❌ ERROR: Pull requests to 'main' must originate from the 'develop' branch."
          # Safely reference the environment variable using standard shell syntax
          echo "Current source branch is '${SOURCE_BRANCH}'."
          exit 1
