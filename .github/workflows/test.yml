name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Environment variables shared across all jobs
env:
  TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/mink_test?sslmode=disable
  TEST_KAFKA_BROKERS: localhost:9092
  # Future adapters:
  # TEST_MONGODB_URL: mongodb://localhost:27017/mink_test
  # TEST_REDIS_URL: redis://localhost:6379

jobs:
  test:
    name: Test with Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Start test infrastructure
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        run: |
          # Run all tests but exclude examples and test utilities from coverage calculation
          go test -race -coverprofile=coverage.out -covermode=atomic \
            $(go list ./... | grep -v '/examples/' | grep -v '/testing/')
          
      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          
          THRESHOLD=90.0
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below the required threshold of ${THRESHOLD}%"
            exit 1
          else
            echo "✅ Coverage ${COVERAGE}% meets the required threshold of ${THRESHOLD}%"
          fi

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          exclude: "*/examples/*,*/testing/*"

      - name: Stop test infrastructure
        if: always()
        run: docker compose -f docker-compose.test.yml down

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CGO_ENABLED: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run Go benchmarks
        run: go test -run='^$' -bench=. -benchmem -benchtime=3s -count=1 . 2>&1 | tee benchmark-results.txt

      - name: Run scale tests (1M events)
        run: go test -run='TestScale_' -v -timeout=10m -count=1 . 2>&1 | tee -a benchmark-results.txt

      - name: Run memory adapter benchmarks
        run: go test -run='^$' -bench=. -benchmem -benchtime=3s -count=1 ./adapters/memory/ 2>&1 | tee -a benchmark-results.txt

      - name: Run memory adapter scale tests
        run: go test -run='TestAdapterScale' -v -timeout=10m -count=1 ./adapters/memory/ 2>&1 | tee -a benchmark-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: benchmark-results.txt
          retention-days: 30

  benchmark-postgres:
    name: Benchmark (PostgreSQL)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mink_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run PostgreSQL adapter benchmarks
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/mink_test?sslmode=disable
        run: go test -run='^$' -bench=. -benchmem -benchtime=3s -count=1 ./adapters/postgres/ 2>&1 | tee benchmark-postgres-results.txt

      - name: Run PostgreSQL adapter scale tests
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/mink_test?sslmode=disable
        run: go test -run='TestAdapterScale' -v -timeout=10m -count=1 ./adapters/postgres/ 2>&1 | tee -a benchmark-postgres-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-postgres-results
          path: benchmark-postgres-results.txt
          retention-days: 30

  build:
    name: Build (${{ matrix.os }}, Go ${{ matrix.go-version }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      CGO_ENABLED: 0
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.22', '1.23', '1.24', '1.25', '1.26']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Build
        run: go build -v ./...

      - name: Run unit tests
        run: go test -short -v ./...
