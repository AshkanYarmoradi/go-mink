# SonarQube Cloud (sonarcloud.io) analysis configuration for go-mink.
# Docs: https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/analysis-parameters/
#
# Project identity. Used by CI-based scanner analysis; with Automatic Analysis
# these come from the server, and the rest of this file is read on each analysis.
sonar.projectKey=AshkanYarmoradi_go-mink
sonar.organization=ashkanyarmoradi

# --- Encoding ---------------------------------------------------------------
# Go / Markdown / YAML sources legitimately contain multibyte UTF-8 (emoji,
# arrows, box-drawing glyphs). Without an explicit encoding the scanner warns:
#   "There are problems with file encoding in the source code."
sonar.sourceEncoding=UTF-8

# --- Scope ------------------------------------------------------------------
# go-mink is a Go library. The Docusaurus docs site under website/ is TypeScript
# whose tsconfig.json extends packages that only exist after `npm install` —
# which Automatic Analysis cannot run, producing:
#   "At least one referenced/extended tsconfig.json was not found ... run 'npm install'".
# The site is documentation, not shipped code, so exclude it from code analysis.
sonar.exclusions=website/**

# --- Coverage ---------------------------------------------------------------
# Import Go coverage produced by the CI "Test with Coverage" job
# (go test -coverprofile=coverage.out). Requires CI-based (scanner) analysis —
# Automatic Analysis cannot import external coverage reports.
sonar.go.coverage.reportPaths=coverage.out

# Go's coverage profile only records the code UNDER test, never the *_test.go files
# themselves — so without this, Sonar counts every line of every test file as
# "uncovered" and tanks "Coverage on New Code" (it literally asks you to cover your
# tests). Exclude test files from the coverage metric; they are still analyzed for
# bugs and code smells. Also exclude the runnable examples and shared test helpers,
# which the CI coverage job deliberately omits (go list | grep -v examples/ testing/),
# so Sonar does not treat their absent coverage as uncovered production code.
sonar.coverage.exclusions=**/*_test.go,examples/**,testing/**

# --- Rule tuning ------------------------------------------------------------
# go:S2077 ("Formatting SQL queries is security-sensitive") fires throughout the
# PostgreSQL adapter, which assembles each statement by interpolating the
# configured schema/table IDENTIFIER. That identifier is (a) set at construction
# time, never from a request; (b) validated against ^[a-zA-Z_][a-zA-Z0-9_]*$; and
# (c) double-quote-escaped via quoteIdentifier(). Every runtime VALUE is passed
# as a bind parameter ($1, $2, ...), never concatenated. The interpolation is
# therefore not injectable, so S2077 is muted for this package.
sonar.issue.ignore.multicriteria=pgident
sonar.issue.ignore.multicriteria.pgident.ruleKey=go:S2077
sonar.issue.ignore.multicriteria.pgident.resourceKey=adapters/postgres/**/*.go
